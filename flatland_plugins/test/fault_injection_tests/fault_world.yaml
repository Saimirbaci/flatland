# Sample fault-injection world. Demonstrates the schema documented in
# doc/fault_injection.md and is loaded by the fault_injector rostest.
#
# The robot publishes scan / imu / odom / tf exactly as in a clean run; the
# FaultInjector below perturbs those in-band signals on a schedule while writing
# the ground-truth label ONLY to the sealed sidecar file and the reserved
# /_ground_truth/faults topic.
properties: {}
layers:
  - name: "2d"
    map: "map.yaml"
    color: [0, 1, 0, 1]
models:
  - name: robot
    pose: [0, 0, 0]
    model: "robot.model.yaml"

plugins:
  - type: FaultInjector
    name: faults
    ground_truth_topic: "/_ground_truth/faults"
    ground_truth_path: "/tmp/flatland_fault_ground_truth.json"
    faults:
      # Time-triggered laser noise + sector occlusion that ramps in at t=2s.
      - id: laser_occlusion_1
        type: laser_sector_occlusion
        target: { model: robot, component: laser_front, topic: scan }
        trigger: { kind: time }
        severity:
          onset_time: 2.0
          ramp_up: 1.0
          hold: -1            # indefinite once active
          ramp_down: 0.0
          peak: 1.0
          profile: step
        params:
          sector_center: 0.0  # straight ahead [rad]
          sector_width: 1.0   # +/- 0.5 rad NaN'd at full severity

      # Time-triggered IMU orientation bias, linear ramp.
      - id: imu_bias_1
        type: sensor_bias
        target: { model: robot, component: imu }
        trigger: { kind: time }
        severity:
          onset_time: 2.0
          ramp_up: 0.5
          hold: -1
          ramp_down: 0.0
          peak: 1.0
          profile: linear
        params:
          bias: 0.5           # rad of yaw bias at full severity

      # Condition-triggered drivetrain torque loss: fires once the robot has
      # travelled 1 m, and only after the IMU bias has fired (chaining).
      - id: torque_loss_1
        type: torque_loss
        target: { model: robot, component: diff_drive }
        trigger:
          kind: condition
          condition: distance_travelled
          threshold: 1.0
          depends_on: imu_bias_1
        severity:
          onset_time: 0.0
          ramp_up: 0.5
          hold: -1
          ramp_down: 0.0
          peak: 1.0
          profile: linear
        params:
          loss: 0.6           # lose 60% of drive velocity at full severity
