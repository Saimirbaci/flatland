# Robot used by the fault-injection integration test. A single dynamic body
# driven by DiffDrive, carrying a Laser and an Imu. The FaultInjector world
# plugin (see fault_world.yaml) perturbs these sensors/drive in-band; the robot
# model itself knows nothing about faults.
bodies:
  - name: base
    type: dynamic
    color: [1, 1, 1, 0.75]
    footprints:
      - type: polygon
        density: 100
        layers: ["2d"]
        points: [[-0.25, -0.25],
                 [ 0.25, -0.25],
                 [ 0.25,  0.25],
                 [-0.25,  0.25]]

plugins:
  - type: DiffDrive
    name: diff_drive
    body: base
    odom_frame_id: odom
    pub_rate: 100

  - type: Laser
    name: laser_front
    body: base
    topic: scan
    frame: laser_front
    broadcast_tf: true
    update_rate: 50
    always_publish: true
    range: 20
    noise_std_dev: 0.0
    angle: {min: -1.5707, max: 1.5707, increment: 0.1}

  - type: Imu
    name: imu
    body: base
    update_rate: 50
    pub_rate: 50

  - type: ModelTfPublisher
    name: tf_publisher
    publish_tf_world: true
