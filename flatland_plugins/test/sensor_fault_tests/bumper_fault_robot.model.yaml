# Stationary robot carrying a single Bumper, used by the bumper sensor-fault
# rostest. The robot touches nothing, so a clean run publishes only empty
# Collisions messages; this makes the phantom (ghost) contact and the delivery
# latency unambiguously observable. The model knows nothing about faults.
bodies:
  - name: base
    type: static
    color: [1, 1, 1, 0.75]
    footprints:
      - type: polygon
        density: 1
        layers: ["2d"]
        points: [[-0.15, -0.15],
                 [ 0.15, -0.15],
                 [ 0.15,  0.15],
                 [-0.15,  0.15]]

plugins:
  - type: Bumper
    name: bumper
    topic: collisions
    world_frame_id: map
    publish_all_collisions: true
    update_rate: 20
