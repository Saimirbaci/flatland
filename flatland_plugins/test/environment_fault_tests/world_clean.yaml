# Clean reference world for the environment-fault rostest: the laser robot on an
# empty plane with NO FaultInjector. The scan shows no near return for the whole
# run; the fault worlds are compared against this clean-run invariant.
properties: {}
layers:
  - name: "2d"
    map: "../surface_friction_tests/map.yaml"
    color: [0, 1, 0, 1]
models:
  - name: robot
    pose: [0, 0, 0]
    model: "laser_robot.model.yaml"
