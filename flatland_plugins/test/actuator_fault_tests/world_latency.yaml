# controller_latency: 0.5 s of extra command transport deadtime is injected onto
# the actuator delay line (the robot has no configured command_latency), so the
# drive response to a forward cmd_vel step is delayed by ~0.5 s. Step profile,
# active from t=0.
properties: {}
layers:
  - name: "2d"
    map: "../diff_drive_tests/map.yaml"
    color: [0, 1, 0, 1]
models:
  - name: robot
    pose: [0, 0, 0]
    model: "robot.model.yaml"

plugins:
  - type: FaultInjector
    name: faults
    ground_truth_topic: "/_ground_truth/faults"
    ground_truth_path: "/tmp/flatland_actuator_latency_gt.json"
    faults:
      - id: controller_latency_1
        type: controller_latency
        target: { model: robot, component: diff_drive, topic: odometry/filtered }
        trigger: { kind: time }
        severity:
          onset_time: 0.0
          ramp_up: 0.0
          hold: -1
          ramp_down: 0.0
          peak: 1.0
          profile: step
        params:
          latency: 0.5   # [s] of extra transport deadtime at full severity
