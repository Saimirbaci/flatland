# asymmetric_wheel_speed: the left wheel is slowed, so a straight forward
# command produces a coupled forward-speed drop AND a leftward (positive) yaw
# drift through Box2D. Step profile, active from t=0.
properties: {}
layers:
  - name: "2d"
    map: "../diff_drive_tests/map.yaml"
    color: [0, 1, 0, 1]
models:
  - name: robot
    pose: [0, 0, 0]
    model: "robot.model.yaml"

plugins:
  - type: FaultInjector
    name: faults
    ground_truth_topic: "/_ground_truth/faults"
    ground_truth_path: "/tmp/flatland_actuator_asymmetric_gt.json"
    faults:
      - id: asymmetric_wheel_speed_1
        type: asymmetric_wheel_speed
        target: { model: robot, component: diff_drive, topic: odometry/filtered }
        trigger: { kind: time }
        severity:
          onset_time: 0.0
          ramp_up: 0.0
          hold: -1
          ramp_down: 0.0
          peak: 1.0
          profile: step
        params:
          imbalance: 0.8   # slow the chosen side by 80%
          side: 0.0        # 0 = left (+y) wheel
