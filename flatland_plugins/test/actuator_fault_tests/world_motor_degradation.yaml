# motor_degradation: the actuator effort cap collapses to ~0, so the robot can
# barely accelerate under the same forward command -> far less distance than the
# clean run. Step profile, active from t=0, indefinite.
properties: {}
layers:
  - name: "2d"
    map: "../diff_drive_tests/map.yaml"
    color: [0, 1, 0, 1]
models:
  - name: robot
    pose: [0, 0, 0]
    model: "robot.model.yaml"

plugins:
  - type: FaultInjector
    name: faults
    ground_truth_topic: "/_ground_truth/faults"
    ground_truth_path: "/tmp/flatland_actuator_motor_degradation_gt.json"
    faults:
      - id: motor_degradation_1
        type: motor_degradation
        target: { model: robot, component: diff_drive, topic: odometry/filtered }
        trigger: { kind: time }
        severity:
          onset_time: 0.0
          ramp_up: 0.0
          hold: -1
          ramp_down: 0.0
          peak: 1.0
          profile: step
        params:
          degrade: 1.0   # fully degraded: effort cap -> 0 -> no acceleration
